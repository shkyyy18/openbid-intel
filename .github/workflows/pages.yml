name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  PYTHONPATH: src

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Generate synthetic demo dashboard
        run: >-
          python run.py
          --db "${{ runner.temp }}/openbid-pages.db"
          demo
          --output "${{ runner.temp }}/demo_digest.md"
          --dashboard-output "_site/index.html"
      - name: Publish configuration schemas
        run: |
          mkdir -p _site/schemas
          cp schemas/*.schema.json _site/schemas/
      - name: Mark site as static
        run: touch _site/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
