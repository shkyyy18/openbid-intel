name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  PYTHONPATH: src

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependency
        run: python -m pip install pytest
      - name: Compile Python sources
        run: python -m compileall -q src tests run.py
      - name: Run unit tests
        run: python -m pytest -q
      - name: Parse PowerShell scripts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem scripts -Filter '*.ps1' -File | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count) {
              $failed = $true
              $errors | ForEach-Object { Write-Error "$($_.Extent.File): $($_.Message)" }
            }
          }
          if ($failed) { exit 1 }
      - name: Run offline release check
        run: python run.py --db data/ci_release_check.db release-check
