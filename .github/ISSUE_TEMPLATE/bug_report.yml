name: Bug report
description: Report a reproducible defect without including secrets or private procurement data.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include webhooks, tokens, cookies, personal data, private attachments, or non-public customer information.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest offline reproduction or sanitized fixture.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Python and OS
      placeholder: "Python 3.11 / Windows 11"
  - type: textarea
    id: checks
    attributes:
      label: Check results
      description: Include relevant pytest or release-check output after removing local paths and sensitive data.
